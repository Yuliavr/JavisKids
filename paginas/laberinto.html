<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .laberinto {
      display: grid;
      grid-template-columns: repeat(4, 50px);
      gap: 5px;
    }
    .camino_jugador {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 14px;
      border: 1px solid #000;

      
    }
    .camino, .camino-fin{
      height: 50px;
      background-color: #f0f0f0;
      border: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .jugador {
      background-color: rgb(39, 97, 86);
      color: white;
    }

    .pared{
      height: 50px;
      background-color: #000;
      border: 1px solid #000;
    }
  </style>
</head>
<body>
  <div id="laberinto" class="laberinto">
    <div class="camino jugador">INICIO</div>
    <div class="camino"></div>
    <div class="pared"></div>
    <div class="camino"></div>
    <div class="pared"></div>
    <div class="camino"></div>
    <div class="camino"></div>
    <div class="pared"></div>
    <div class="pared"></div>
    <div class="pared"></div>
    <div class="camino"></div>
    <div class="pared"></div>
    <div class="pared"></div>
    <div class="camino"></div>
    <div class="camino"></div>
    <div class="camino"></div>
    <div class="camino"></div>
    <div class="pared"></div>
    <div class="pared"></div>
    <div class="pared"></div>
    <div class="camino"></div>
    <div class="camino"></div>
    <div class="camino"></div>
    <div class="camino camino-fin">FIN</div>
  </div>

  <script>
    const laberinto = document.getElementById('laberinto');
    let jugadorPos = 0;

    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowUp':
          mover(-4);
          break;
        case 'ArrowDown':
          mover(4);
          break;
        case 'ArrowLeft':
          mover(-1);
          break;
        case 'ArrowRight':
          mover(1);
          break;
      }
    });

    function mover(direccion) {
      const nuevaPos = jugadorPos + direccion;
      const casillas = laberinto.children;
      if(casillas[nuevaPos].classList.contains('camino')) {
        casillas[jugadorPos].classList.remove('jugador');
        casillas[nuevaPos].classList.add('jugador');
        jugadorPos = nuevaPos;
        if (casillas[nuevaPos].classList.contains('camino-fin')) {
          alert('¡Terminaste el juego! ¡Felicidades!');
        }
      }
    }
  </script>
</body>
</html>
