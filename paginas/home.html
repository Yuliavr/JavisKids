<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Currículum Bussiness</title>
  <!-- <link href="style.css" rel="stylesheet"/> -->
   <style>
    *{
  margin:0;
  padding:0;
  font-family:'Poppins', sans-serif;
  box-sizing:border-box;
}

body{
  background-color:#0c141e;
  color: #ffff;
}

.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:20px 10%;
  background: transparent;
  display:flex;
  justify-content: space-between;
  align-items: center;
  z-index:100;
}

.logo{
  font-size:25px;
  color:#0ef;
  border:3px solid #0ef;
  text-decoration: none;
  font-weight:600;
  cursor:default;
  animation:slideRight 1s ease forwards;
}

.navbar a{
  font-size:10px;
  color:#ffff;
  text-decoration: none;
  font-weight:500;
  margin-left:35px;
}

/*cambia color al nav*/
.navbar a:hover,.navbar a.active{
  color:#0ef;
}

.home{
  position: relative;
  width: 100px;
  height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items:center;
  padding: 70px 10% 0;

}

.home-content{
  max-width:600px;
}

.home-content h3{
  font-size:56px;
  font-weight:700;
  color:#0ef;
  margin: 20px 0;
}

.home-content p{
  font-size:16px;
}

.home-content p:nth-of-type(2){
  margin-bottom: 30px;
}

.home-img img{
  max-width: 500px;
  margin-left: 350px; 

}

.btn{
  display:inline-block;
  padding:12px 28px;
  background:#0ef;
  border-radius:40px;
  box-shadow:0 0 10px #0ef;
  font-size:16px;
  color: #0c141e;
  letter-spacing:1px;
  text-decoration:none;
  font-weight:600;
  margin:30px 0;
}

/*KEYFRAMES ANIMATION*/
@keyframes SlideRight{
  0%{
    transform:traslateX(100px);
    opacity:0;
  }

  100%{
    transform:traslateX(0);
    opacity:1;
  }
}

   </style>
</head>

<body>
<header class="header">
<a href="#" class="logo">JK</a>
  
<nav class="navbar">
  <a href="#" class="ative">Home</a>
  <a href="#">Login</a>
  <a href="#">Discover</a>
  <a href="#">Mision</a>
  <a href="#">contact</a>
</nav>
</header>
  
<section class="home">
  <div class="home-content">
    <h3>JavisKids</h3>
    <p>Is a web platform designed to 
        teach programming and development 
        of multimedia projects to children and 
        young people with a real text editor.
    </p>
    <div>
       <a href="#" class="btn">Inicia
         Sesión</a>
    </div>
  </div>

  <div class="home-img">
       <img src="D:\yulia\paginas\pythonkids\img\Icons\logo2.png"/>
  </div>
    
</section>

<script src="script.js"></script>
  
</body>

</html>
